<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Assistente Virtual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-wrapper">
        <header>
            <div class="status-online"></div>
            <h1>Assistente IA</h1>
        </header>

        <div id="chat-container">
            <div class="message bot">Olá! Eu sou sua assistente. Como posso te ajudar hoje?</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Digite sua mensagem...">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
